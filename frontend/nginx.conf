server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── Security Headers ─────────────────────────────────────────
    # Hide nginx version from response headers
    server_tokens off;

    # Prevent clickjacking — only allow framing from same origin
    add_header X-Frame-Options "SAMEORIGIN" always;

    # Prevent MIME-type sniffing — forces browser to respect declared Content-Type
    add_header X-Content-Type-Options "nosniff" always;

    # Enable XSS filtering in older browsers
    add_header X-XSS-Protection "1; mode=block" always;

    # Control what info is sent in Referrer header
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Restrict browser features (camera, mic, geolocation, etc.)
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # ── Performance ──────────────────────────────────────────────
    # Gzip compression — reduces transfer size by ~70%
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml image/svg+xml;
    gzip_min_length 256;
    gzip_vary on;

    # SPA routing — send all paths to index.html for React Router
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets aggressively (Vite hashes filenames, so this is safe)
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # Block access to hidden files (.env, .git, etc.)
    location ~ /\. {
        deny all;
        return 404;
    }
}
